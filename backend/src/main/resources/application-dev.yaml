spring:
  datasource:
    url: jdbc:mysql://localhost:3306/studyspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug