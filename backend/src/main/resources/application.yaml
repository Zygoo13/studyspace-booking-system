spring:
  application:
    name: studyspace-backend
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/studyspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  security:
    issuer: studyspace-backend
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7

rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.studyspace: DEBUG